<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPaaS - Smart Packaging</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0f172a;color:white;overflow-x:hidden}

header{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:radial-gradient(circle at top,#1e293b,#020617);
}

header h1{
    font-size:60px;
    background:linear-gradient(90deg,#22c55e,#4ade80);
    -webkit-background-clip:text;
    color:transparent;
}

header p{margin:15px 0;font-size:18px;opacity:.8}

.btn{
    padding:14px 28px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.section{padding:100px 20px;text-align:center}
.cards{display:flex;flex-wrap:wrap;justify-content:center}

.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    margin:15px;
    padding:25px;
    width:260px;
    border-radius:15px;
}

.login-box{
    background:rgba(255,255,255,0.05);
    padding:30px;
    border-radius:12px;
    display:inline-block;
}

input{
    padding:10px;
    margin:10px;
    border:none;
    border-radius:5px;
}

.status{margin-top:10px}

footer{background:#020617;padding:20px;text-align:center}
</style>
</head>

<body>

<header>
    <h1>RPaaS</h1>
    <p>Reusable Packaging Platform</p>
</header>

<section class="section">
    <h2>🔐 Login System (Demo)</h2>
    <div class="login-box">
        <input id="user" placeholder="Enter ID"><br>
        <input id="pass" type="password" placeholder="Enter Password"><br>
        <button class="btn" onclick="login()">Login</button>
        <div class="status" id="loginStatus"></div>
    </div>
</section>

<section class="section">
    <h2>⚙️ Live Tracker</h2>
    <input id="pkg" placeholder="Package ID">
    <button class="btn" onclick="track()">Track</button>
    <div id="out"></div>
</section>

<footer>
    <p>RPaaS Demo Project</p>
</footer>

<script>
// HARDCODED USERS
const business = { id: "business123", pass: "biz@123" };
const customer = { id: "customer123", pass: "cust@123" };

function login(){
    let id=document.getElementById('user').value;
    let pass=document.getElementById('pass').value;
    let status=document.getElementById('loginStatus');

    if(id===business.id && pass===business.pass){
        status.innerText="Logged in as Business ✅";
    }
    else if(id===customer.id && pass===customer.pass){
        status.innerText="Logged in as Customer ✅";
    }
    else{
        status.innerText="Invalid Credentials ❌";
    }
}

function track(){
    let arr=["In Use 📦","Returned ✅","Transit 🚚","Lost ❌"];
    document.getElementById('out').innerText = arr[Math.floor(Math.random()*arr.length)];
}
</script>

</body>
</html>
