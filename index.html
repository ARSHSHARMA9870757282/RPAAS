<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoPack</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #0f2027, #2c5364);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(15px);
        padding: 30px;
        border-radius: 20px;
        width: 320px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        animation: fadeIn 0.6s ease;
    }

    h1 { margin-bottom: 15px; }

    input {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border: none;
        border-radius: 10px;
        outline: none;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 10px;
        background: #00c853;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #00e676;
        transform: scale(1.05);
    }

    .hidden { display: none; }

    .wallet {
        font-size: 24px;
        margin: 15px 0;
        color: #00e676;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<div id="home" class="card">
    <h1>♻️ EcoPack</h1>
    <p>Reusable Packaging System</p>
    <button onclick="show('customerLogin')">Customer</button>
    <button onclick="show('businessLogin')">Business</button>
</div>

<div id="customerLogin" class="card hidden">
    <h1>Customer Login</h1>
    <input placeholder="Username">
    <input type="password" placeholder="Password">
    <button onclick="show('customerDash')">Login</button>
</div>

<div id="businessLogin" class="card hidden">
    <h1>Business Login</h1>
    <input placeholder="Business Name">
    <input type="password" placeholder="Password">
    <button onclick="show('businessDash')">Login</button>
</div>

<div id="customerDash" class="card hidden">
    <h1>Wallet</h1>
    <div class="wallet">₹<span id="money">100</span></div>
    <button onclick="addMoney()">Return Package +₹20</button>
    <button onclick="reset()">Logout</button>
</div>

<div id="businessDash" class="card hidden">
    <h1>Business Panel</h1>
    <p>Packages Used: 50</p>
    <p>Returns Pending: 10</p>
    <button onclick="reset()">Logout</button>
</div>

<script>
let balance = 100;

function show(id) {
    document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function addMoney() {
    balance += 20;
    document.getElementById('money').innerText = balance;
}

function reset() {
    location.reload();
}
</script>

</body>
</html>
