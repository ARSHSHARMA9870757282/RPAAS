<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RPaaS - Reusable Packaging</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    background: #020617;
}
nav h2 { color: #22c55e; }

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px;
}
.hero h1 {
    font-size: 40px;
}
.hero p {
    color: #94a3b8;
}
.btn {
    background: #22c55e;
    padding: 12px 25px;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    margin-top: 20px;
}

/* LOGIN */
.login-box {
    display: none;
    text-align: center;
    margin-top: 50px;
}
input {
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
    border: none;
}

/* DASHBOARD */
.dashboard {
    display: none;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    margin: 10px;
    border-radius: 10px;
    display: inline-block;
    width: 200px;
}

.logout {
    float: right;
    cursor: pointer;
    color: red;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <h2>RPaaS</h2>
    <button class="btn" onclick="showLogin()">Business Login</button>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>Reusable Packaging-as-a-Service</h1>
    <p>Reduce Waste. Save Cost. Build Sustainable Future.</p>
    <button class="btn" onclick="showLogin()">Get Started</button>
</div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
    <h2>Business Login</h2>
    <input type="text" id="id" placeholder="Business ID"><br>
    <input type="password" id="pass" placeholder="Password"><br>
    <button class="btn" onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
    <span class="logout" onclick="logout()">Logout</span>
    <h2>Business Dashboard</h2>

    <div class="card">
        <h3>Wallet Balance</h3>
        <p id="wallet">₹5000</p>
    </div>

    <div class="card">
        <h3>Active Packages</h3>
        <p>120</p>
    </div>

    <div class="card">
        <h3>Returned</h3>
        <p>95</p>
    </div>

    <div class="card">
        <h3>Lost</h3>
        <p>25</p>
    </div>

    <h3>Scan QR (Simulation)</h3>
    <button class="btn" onclick="scan()">Simulate Return</button>
</div>

<script>
const BUSINESS_ID = "business123";
const PASSWORD = "pass123";

let wallet = 5000;

function showLogin() {
    document.querySelector(".hero").style.display = "none";
    document.getElementById("loginBox").style.display = "block";
}

function login() {
    let id = document.getElementById("id").value;
    let pass = document.getElementById("pass").value;

    if (id === BUSINESS_ID && pass === PASSWORD) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
    } else {
        alert("Invalid Login!");
    }
}

function logout() {
    location.reload();
}

function scan() {
    wallet += 20;
    document.getElementById("wallet").innerText = "₹" + wallet;
    alert("Package Returned & Wallet Updated!");
}
</script>

</body>
</html>
